name: Bug report
description: Something in mod_turbotab / turbotab is not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: The exact `turbotab` command you ran and its output (use --json if possible).
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show mod-turbotab` or the git commit you're on.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
    validations:
      required: true
