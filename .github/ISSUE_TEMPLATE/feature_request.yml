name: Feature request
description: Suggest a calculation, CLI flag, or capability for mod_turbotab
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What command/flag/output would solve it? Example usage welcome.
    validations:
      required: true
