name: Close pull requests

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    if: github.event.pull_request.user.login != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: [
                "Thanks for the PR, but this repository does not accept code contributions.",
                "See [CONTRIBUTING.md](https://github.com/" + owner + "/" + repo + "/blob/main/CONTRIBUTING.md) for details.",
                "",
                "If this is a bug fix or feature idea, please open an issue instead — closing this PR.",
              ].join("\n"),
            });
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr_number,
              state: "closed",
            });
